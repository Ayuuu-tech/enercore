name: CI

on:
  push:
    branches: [main, enercore-real-data-and-admin]
  pull_request:

jobs:
  backend:
    name: Backend (NestJS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      # The Prisma client is generated code the compiler and tests depend on.
      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.json

      - name: Test
        run: npm test -- --ci

      - name: Build
        run: npm run build

  app:
    name: App (Flutter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      # Catches breakage the analyzer can't see (Gradle, plugins, manifest).
      # Unsigned: release signing needs the keystore, which is not in the repo.
      - name: Build APK
        run: flutter build apk --debug
