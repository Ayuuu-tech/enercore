name: Deploy backend

# Deploying from a laptop meant zipping node_modules and pushing ~130 MB to a
# B1 App Service — 10–15 minutes, and it failed as often as it worked. GitHub's
# runners build the artefact and push it from inside Azure's network instead.
on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'
  # Lets you redeploy the current main without pushing a commit.
  workflow_dispatch:

concurrency:
  # Never let two deploys race each other onto the same App Service.
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy to Azure
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      # Build with dev dependencies present…
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build

      # …then reduce to what production actually runs. Oryx times out compiling
      # Nest on a B1, so we ship a prebuilt artefact and leave Azure's build off.
      - name: Stage the production artefact
        run: |
          rm -rf ../artefact && mkdir -p ../artefact
          cp package.json package-lock.json ../artefact/
          cd ../artefact
          npm ci --omit=dev --ignore-scripts
          cd ../backend
          cp -r dist prisma prisma.config.ts ../artefact/
          # The Prisma client is generated code; carry it over rather than
          # regenerating it on the App Service.
          cp -r node_modules/.prisma node_modules/@prisma ../artefact/node_modules/
          cd ../artefact
          npm pkg delete scripts.postinstall

      - name: Zip the artefact
        working-directory: artefact
        run: zip -qr ../deploy.zip .

      # azure/webapps-deploy zips ~120 MB and pushes it synchronously; on a B1
      # the SCM side is slow enough that the action times out (the same reason
      # manual `az webapp deploy` had to run --async). So we drive Kudu directly:
      # an async zipdeploy, then poll for the real terminal status.
      - name: Deploy to Azure (async zipdeploy) and verify
        working-directory: .
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          set -euo pipefail
          APP=enercore-api-11148
          SCM="https://$APP.scm.azurewebsites.net"

          # Pull the MSDeploy credentials out of the publish profile.
          user=$(printf '%s' "$PUBLISH_PROFILE" | grep -o 'userName="[^"]*"' | head -1 | sed 's/userName="\(.*\)"/\1/')
          pass=$(printf '%s' "$PUBLISH_PROFILE" | grep -o 'userPWD="[^"]*"'  | head -1 | sed 's/userPWD="\(.*\)"/\1/')
          if [ -z "$user" ] || [ -z "$pass" ]; then
            echo "Could not read credentials from AZURE_WEBAPP_PUBLISH_PROFILE"; exit 1
          fi

          echo "Uploading package…"
          code=$(curl -s -o /dev/null -w '%{http_code}' -u "$user:$pass" \
            --max-time 600 -X POST "$SCM/api/zipdeploy?isAsync=true" \
            -H 'Content-Type: application/zip' --data-binary @deploy.zip)
          echo "zipdeploy accepted: HTTP $code"
          [ "$code" = "202" ] || [ "$code" = "200" ] || { echo "upload rejected"; exit 1; }

          echo "Waiting for the deployment to finish…"
          for i in $(seq 1 40); do
            status=$(curl -s -u "$user:$pass" --max-time 30 "$SCM/api/deployments/latest" \
              | python3 -c "import sys,json;print(json.load(sys.stdin).get('status','?'))" 2>/dev/null || echo '?')
            echo "  poll $i: status=$status"   # 4 = success, 3 = failed
            [ "$status" = "4" ] && break
            [ "$status" = "3" ] && { echo "deployment failed on Azure"; exit 1; }
            sleep 15
          done

          echo "Waiting for the API to come back healthy…"
          for i in $(seq 1 40); do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 20 \
              "https://$APP.azurewebsites.net/api" || true)
            echo "  health $i: HTTP $code"
            [ "$code" = "200" ] && exit 0
            sleep 15
          done
          echo "API did not return healthy after the deploy"; exit 1
